<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HLS MinIO Test</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body style="background-color: #222; color: white; text-align: center; font-family: sans-serif; padding-top: 50px;">

    <h1>HLS Streaming from MinIO</h1>
    
    <video id="video-player" controls style="max-width: 800px; width: 100%; border: 2px solid #444; border-radius: 8px;"></video>

    <script>
        const video = document.getElementById('video-player');
        
        // 2. Point exactly to the manifest file inside your 'test' folder
        const videoSrc = 'http://127.0.0.1:9000/public-media/test/manifest.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                console.log("Manifest loaded successfully!");
            });
        } 
        // Fallback for Safari, which CAN play HLS natively
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
</body>
</html>
